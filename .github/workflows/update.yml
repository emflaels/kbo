name: KBO Stats Auto Update

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests beautifulsoup4

      - name: KBO 크롤링 실행
        run: python crawl.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions Bot"
          git add data/stats.json
          git diff --staged --quiet || git commit -m "⚾ KBO 스탯 자동 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git push
