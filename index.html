<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 KBO 선수 스탯 · 실시간</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0f1e;
    --card: #161d2e;
    --border: #1e293b;
    --accent: #f59e0b;
    --accent2: #ef4444;
    --green: #10b981;
    --blue: #3b82f6;
    --purple: #a855f7;
    --pink: #ec4899;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* Header */
  header { padding: 48px 0 32px; border-bottom: 1px solid var(--border); }
  .header-inner { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .logo-area h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(2rem, 6vw, 3.8rem);
    letter-spacing: -1px; line-height: 1;
    background: linear-gradient(135deg, #f59e0b, #fbbf24, #ef4444);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo-area p { color: var(--muted); font-size: 0.8rem; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; }
  .live-badge {
    display: flex; align-items: center; gap: 8px;
    background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3);
    color: var(--green); font-size: 0.75rem; font-weight: 700;
    padding: 6px 14px; border-radius: 2px; letter-spacing: 1px;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

  /* Loading */
  #loading {
    text-align: center; padding: 80px 20px; color: var(--muted);
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  #error { display: none; text-align: center; padding: 60px 20px; }
  #error p { color: var(--accent2); margin-bottom: 12px; }
  #error a { color: var(--accent); text-decoration: none; font-weight: 700; }

  /* Update info */
  .update-bar {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
    padding: 12px 0; margin: 24px 0 8px;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem; color: var(--muted); letter-spacing: 1px;
  }
  .update-bar a { color: var(--accent); text-decoration: none; }

  /* Tab nav */
  .tab-nav { display: flex; margin: 24px 0 28px; border-bottom: 1px solid var(--border); }
  .tab-btn {
    background: none; border: none; color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem; font-weight: 600;
    padding: 10px 24px; cursor: pointer; position: relative; transition: color 0.2s; letter-spacing: 1px;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active::after {
    content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
    height: 2px; background: var(--accent);
  }
  .tab-btn:hover { color: var(--text); }

  /* Tab content */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Hero banner */
  .hero-banner {
    background: linear-gradient(135deg, #1a0f00 0%, #0a0f1e 100%);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 20px 28px; margin-bottom: 28px;
    display: flex; align-items: center; flex-wrap: wrap; gap: 0;
    position: relative; overflow: hidden;
  }
  .hero-banner::before {
    content: '⚾'; position: absolute; right: -20px; top: 50%;
    transform: translateY(-50%); font-size: 8rem; opacity: 0.04; pointer-events: none;
  }
  .hero-stat { text-align: center; padding: 8px 20px; border-right: 1px solid var(--border); flex: 1; min-width: 100px; }
  .hero-stat:last-child { border-right: none; }
  .hero-stat-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .hero-stat-name { font-family: 'Black Han Sans', sans-serif; font-size: 1rem; color: var(--text); }
  .hero-stat-val { font-size: 0.85rem; color: var(--accent); font-weight: 700; margin-top: 2px; }
  .hero-stat-team { font-size: 0.65rem; color: var(--muted); }

  /* Stats grid */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; margin-bottom: 48px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 4px;
    overflow: hidden; animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .card-header {
    padding: 12px 18px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .card-icon {
    width: 26px; height: 26px; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem; font-weight: 700; flex-shrink: 0;
  }
  .card-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

  .rank-list { padding: 6px 0; }
  .rank-row {
    display: grid; grid-template-columns: 28px 1fr 80px 52px;
    align-items: center; gap: 10px; padding: 9px 18px;
    transition: background 0.15s; cursor: default;
  }
  .rank-row:hover { background: rgba(255,255,255,0.03); }
  .rank-num { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-align: center; }
  .rank-row:first-child .rank-num { color: var(--accent); font-size: 0.85rem; }
  .player-name { font-size: 0.86rem; font-weight: 600; }
  .player-team { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
  .stat-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .stat-bar { height: 100%; border-radius: 2px; transition: width 1s ease; }
  .stat-val { font-size: 0.88rem; font-weight: 700; text-align: right; }
  .rank-row:first-child .stat-val { font-size: 0.95rem; }

  /* Footer */
  .source-note {
    border-top: 1px solid var(--border); padding: 20px 0;
    text-align: center; color: var(--muted); font-size: 0.72rem; letter-spacing: 1px;
  }
  .source-note a { color: var(--accent); text-decoration: none; }

  @media (max-width: 640px) {
    .stats-grid { grid-template-columns: 1fr; }
    .hero-banner { flex-direction: column; }
    .hero-stat { border-right: none; border-bottom: 1px solid var(--border); width: 100%; }
    .hero-stat:last-child { border-bottom: none; }
    .rank-row { grid-template-columns: 24px 1fr 60px 44px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo-area">
        <h1>KBO 선수 스탯</h1>
        <p>Korea Baseball Organization · Real-time Stats</p>
      </div>
      <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    </div>
  </header>

  <!-- 로딩 -->
  <div id="loading">
    <div class="spinner"></div>
    <p>KBO 스탯 불러오는 중...</p>
  </div>

  <!-- 에러 -->
  <div id="error">
    <p>⚠️ 데이터를 불러오지 못했습니다.</p>
    <a href="https://www.koreabaseball.com/Record/Main.aspx" target="_blank">→ KBO 공식 홈페이지에서 직접 확인</a>
  </div>

  <!-- 메인 콘텐츠 (JS로 렌더링) -->
  <div id="main" style="display:none">
    <div class="update-bar">
      <span>📅 마지막 업데이트: <strong id="updated-at">-</strong></span>
      <span>출처: <a href="https://www.koreabaseball.com/Record/Main.aspx" target="_blank">KBO 공식 홈페이지</a></span>
    </div>

    <nav class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('hitter', this)">⚾ 타자 기록</button>
      <button class="tab-btn" onclick="switchTab('pitcher', this)">🎯 투수 기록</button>
    </nav>

    <!-- 타자 탭 -->
    <div id="hitter" class="tab-content active">
      <div class="hero-banner" id="hitter-hero"></div>
      <div class="stats-grid" id="hitter-grid"></div>
    </div>

    <!-- 투수 탭 -->
    <div id="pitcher" class="tab-content">
      <div class="hero-banner" id="pitcher-hero"></div>
      <div class="stats-grid" id="pitcher-grid"></div>
    </div>
  </div>

  <footer class="source-note">
    데이터 출처: <a href="https://www.koreabaseball.com/Record/Main.aspx" target="_blank">KBO 공식 홈페이지</a>
    &nbsp;·&nbsp; GitHub Actions로 하루 3회 자동 업데이트
  </footer>
</div>

<script>
// 카테고리별 색상/아이콘 설정
const CATEGORY_STYLE = {
  avg:  { label:'타율',      icon:'AVG', bg:'rgba(245,158,11,0.15)',  color:'#f59e0b' },
  hr:   { label:'홈런',      icon:'HR',  bg:'rgba(239,68,68,0.15)',   color:'#ef4444' },
  rbi:  { label:'타점',      icon:'RBI', bg:'rgba(59,130,246,0.15)',  color:'#3b82f6' },
  sb:   { label:'도루',      icon:'SB',  bg:'rgba(16,185,129,0.15)', color:'#10b981' },
  r:    { label:'득점',      icon:'R',   bg:'rgba(168,85,247,0.15)', color:'#a855f7' },
  h:    { label:'안타',      icon:'H',   bg:'rgba(236,72,153,0.15)', color:'#ec4899' },
  obp:  { label:'출루율',    icon:'OBP', bg:'rgba(245,158,11,0.15)', color:'#f59e0b' },
  era:  { label:'평균자책점', icon:'ERA', bg:'rgba(239,68,68,0.15)',  color:'#ef4444' },
  win:  { label:'승',        icon:'W',   bg:'rgba(16,185,129,0.15)', color:'#10b981' },
  so:   { label:'탈삼진',    icon:'K',   bg:'rgba(59,130,246,0.15)', color:'#3b82f6' },
  sv:   { label:'세이브',    icon:'SV',  bg:'rgba(245,158,11,0.15)', color:'#f59e0b' },
  hld:  { label:'홀드',      icon:'HLD', bg:'rgba(168,85,247,0.15)', color:'#a855f7' },
  whip: { label:'WHIP',      icon:'WHP', bg:'rgba(236,72,153,0.15)', color:'#ec4899' },
};

// 1위 값 기준 상대 비율 계산
function getMax(players) {
  if (!players.length) return 1;
  const v = parseFloat(players[0].value);
  return isNaN(v) ? 1 : v;
}

function buildCard(key, data, delay) {
  const style = CATEGORY_STYLE[key] || { label: data.label, icon: key.toUpperCase(), bg:'rgba(100,116,139,0.15)', color:'#64748b' };
  const players = data.players || [];
  const maxVal = getMax(players);

  const rows = players.map((p, i) => {
    const val = parseFloat(p.value);
    const pct = isNaN(val) ? 50 : Math.round((val / maxVal) * 100);
    const isFirst = i === 0;
    return `
      <div class="rank-row">
        <div class="rank-num">${p.rank}</div>
        <div>
          <div class="player-name">${p.name}</div>
          <div class="player-team">${p.team}</div>
        </div>
        <div class="stat-bar-wrap">
          <div class="stat-bar" style="width:${pct}%;background:${isFirst ? style.color : '#334155'}"></div>
        </div>
        <div class="stat-val" style="${isFirst ? 'color:'+style.color : ''}">${p.value}</div>
      </div>`;
  }).join('');

  return `
    <div class="stat-card" style="animation-delay:${delay}s">
      <div class="card-header">
        <div class="card-icon" style="background:${style.bg};color:${style.color}">${style.icon}</div>
        <span class="card-title" style="color:${style.color}">${style.label}</span>
      </div>
      <div class="rank-list">${rows || '<div style="padding:20px;color:#64748b;text-align:center;font-size:0.8rem">데이터 없음</div>'}</div>
    </div>`;
}

function buildHero(statsObj) {
  // 타자: 타율·홈런·타점·도루·안타 1위 표시
  const picks = ['avg','hr','rbi','sb','h'];
  return picks.map(key => {
    const d = statsObj[key];
    if (!d || !d.players.length) return '';
    const p1 = d.players[0];
    const style = CATEGORY_STYLE[key];
    return `
      <div class="hero-stat">
        <div class="hero-stat-label">${style.label} 1위</div>
        <div class="hero-stat-name">${p1.name}</div>
        <div class="hero-stat-val">${p1.value}</div>
        <div class="hero-stat-team">${p1.team}</div>
      </div>`;
  }).join('');
}

function buildPitcherHero(statsObj) {
  const picks = ['era','win','so','sv'];
  return picks.map(key => {
    const d = statsObj[key];
    if (!d || !d.players.length) return '';
    const p1 = d.players[0];
    const style = CATEGORY_STYLE[key];
    return `
      <div class="hero-stat">
        <div class="hero-stat-label">${style.label} 1위</div>
        <div class="hero-stat-name">${p1.name}</div>
        <div class="hero-stat-val">${p1.value}</div>
        <div class="hero-stat-team">${p1.team}</div>
      </div>`;
  }).join('');
}

// 메인: stats.json 로드 → 렌더링
async function loadStats() {
  try {
    // 캐시 방지를 위해 타임스탬프 추가
    const res = await fetch(`data/stats.json?t=${Date.now()}`);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();

    // 업데이트 시간
    document.getElementById('updated-at').textContent = data.updated_at || '-';

    // 타자 Hero
    document.getElementById('hitter-hero').innerHTML = buildHero(data.hitter);

    // 타자 카드
    const hitterOrder = ['avg','hr','rbi','sb','r','h','obp'];
    document.getElementById('hitter-grid').innerHTML =
      hitterOrder.map((k, i) => data.hitter[k] ? buildCard(k, data.hitter[k], i * 0.05) : '').join('');

    // 투수 Hero
    document.getElementById('pitcher-hero').innerHTML = buildPitcherHero(data.pitcher);

    // 투수 카드
    const pitcherOrder = ['era','win','so','sv','hld','whip'];
    document.getElementById('pitcher-grid').innerHTML =
      pitcherOrder.map((k, i) => data.pitcher[k] ? buildCard(k, data.pitcher[k], i * 0.05) : '').join('');

    // 보여주기
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';

  } catch (e) {
    console.error(e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

loadStats();
</script>
</body>
</html>
